<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Losovátko</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-absolute: #000000; /* Absolutní černá pro pozadí */
            --bg-panel: #111111;   /* Velmi tmavá šedá pro panely */
            --bg-input: #080808;   /* Téměř černá pro vstupy */
            --text-main: #ffffff;  /* Čistě bílá pro text */
            --text-muted: #888888; /* Šedá pro méně důležitý text */
            --accent: #00ffff;     /* Neonová azurová pro akcenty a záři */
            --accent-dim: rgba(0, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.08); /* Velmi jemný border */
            --glass: blur(10px);
        }

        * { box-sizing: border-box; outline: none; transition: all 0.2s ease-in-out; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-absolute);
            color: var(--text-main); 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            letter-spacing: -0.02em; /* Moderní 'tight' vzhled */
        }

        /* Hlavní kontejner - Skleněný efekt */
        .container {
            width: 95%;
            max-width: 1000px;
            background: var(--bg-panel);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            margin-top: 20px;
            margin-bottom: 40px;
        }
        
        h1.main-title {
            text-align: center;
            font-weight: 900;
            font-size: 2.8rem;
            margin: 0 0 40px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        /* Režimy - Přepínač */
        .mode-selector {
            display: flex;
            background: rgba(255,255,255,0.03);
            padding: 5px;
            border-radius: 14px;
            gap: 2px;
            margin-bottom: 25px;
            justify-content: center;
            border: 1px solid var(--border);
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-btn:hover { color: #fff; }

        .mode-btn.active {
            background: rgba(255,255,255,0.07);
            color: var(--accent);
            box-shadow: 0 0 15px var(--accent-dim);
        }

        /* Dynamické nastavení počtu */
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        #count-label { font-weight: 500; color: var(--text-muted); }

        input[type="number"] {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 10px;
            border-radius: 8px;
            width: 70px;
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
        }
        
        input[type="number"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-dim);
        }

        /* Vstup pro jména */
        textarea {
            width: 100%;
            height: 160px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: #fff;
            padding: 20px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 30px;
            resize: vertical;
            line-height: 1.6;
        }

        textarea:focus {
            border-color: rgba(255,255,255,0.2);
            background: #0c0c0c;
        }

        /* Hlavní tlačítka */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1.3rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #startBtn { 
            background: #fff; /* Bílé tlačítko na černém pozadí */
            color: #000; 
        }
        #startBtn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.1); }

        #stopBtn { 
            background: transparent;
            color: #fff; 
            display: none; 
            border: 2px solid #fff;
            animation: pulseGlow 1.5s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* Status text */
        #status-text {
            text-align: center;
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 40px;
            min-height: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* KOLO ŠTĚSTÍ - DARK THEME */
        #wheel-wrapper {
            position: relative;
            width: 480px;
            height: 480px;
            margin: 0 auto 60px;
            display: none;
        }

        .wheel-arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid #fff; /* Bílá šipka */
            z-index: 100;
        }
        
        canvas {
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1);
            background: #000;
        }

        /* VÝSLEDKY - MINIMALISTICKÉ KARTY */
        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .group-card {
            background: var(--bg-panel);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            animation: cardAppear 0.4s ease out;
        }
        
        @keyframes cardAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .group-header {
            font-weight: 700;
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-size: 1.1rem;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .member-list {
            list-style: none;
            padding: 5px 0;
            margin: 0;
        }

        .member-item {
            padding: 12px 20px;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.01);
            color: var(--text-main);
        }
        
        .member-item::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            background: #333;
            border-radius: 50%;
            margin-right: 12px;
            vertical-align: middle;
        }

        .member-item:last-child { border-bottom: none; }

        /* Scrollbar pro textareau */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: var(--bg-input); border-radius: 10px; }
        textarea::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #333; }

        /* Responzivita */
        @media (max-width: 768px) {
            .container { padding: 25px; }
            h1.main-title { font-size: 2rem; }
            #wheel-wrapper { width: 300px; height: 300px; }
            canvas { width: 300px; height: 300px; }
            #status-text { font-size: 1.6rem; }
            .btn { font-size: 1.1rem; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">Losovátko</h1>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('spinner', this)">Kolo Štěstí</button>
        <button class="mode-btn" onclick="setMode('groups', this)">Dvojice/Trojice</button>
        <button class="mode-btn" onclick="setMode('teams', this)">Počet Týmů</button>
    </div>

    <div id="settings-area" class="settings-row" style="display: none;">
        <span id="count-label">Nastavit počet:</span>
        <input type="number" id="countInput" value="2" min="1" max="100">
    </div>

    <textarea id="namesInput" placeholder="Zadejte jména (jedno jméno na řádek)..."></textarea>
    
    <div class="controls">
        <button id="startBtn" class="btn" onclick="startProcess()">START</button>
        <button id="stopBtn" class="btn" onclick="stopProcess()">STOP!</button>
    </div>

    <div id="status-text"></div>

    <div id="wheel-wrapper">
        <div class="wheel-arrow"></div>
        <canvas id="wheel-canvas" width="480" height="480"></canvas>
    </div>

    <div id="output" class="group-grid"></div>
</div>

<script>
    let currentMode = 'spinner';
    let currentRotation = 0;
    let shuffleInterval;
    let isShuffling = false;

    function setMode(mode, btn) {
        if(isShuffling) return;
        currentMode = mode;
        
        // Update tlačítek
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Zobrazení/skrytí prvků
        document.getElementById('settings-area').style.display = (mode === 'spinner') ? 'none' : 'flex';
        document.getElementById('wheel-wrapper').style.display = (mode === 'spinner') ? 'block' : 'none';
        
        // Vyčištění
        document.getElementById('output').innerHTML = "";
        document.getElementById('status-text').innerText = "";
        if(mode === 'spinner') drawWheel();
    }

    function getNames() {
        return document.getElementById('namesInput').value.split('\n').map(n => n.trim()).filter(n => n !== "");
    }

    // Kolo štěstí v Dark variantě (střídá tmavě šedou a černou)
    function drawWheel() {
        const names = getNames();
        if (names.length === 0 || currentMode !== 'spinner') return;
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const center = 240;
        const slice = (Math.PI * 2) / names.length;
        ctx.clearRect(0,0,480,480);
        
        names.forEach((name, i) => {
            ctx.beginPath();
            ctx.fillStyle = (i % 2 === 0) ? '#0a0a0a' : '#1a1a1a';
            ctx.moveTo(center, center);
            ctx.arc(center, center, 238, i * slice, (i + 1) * slice);
            ctx.fill();
            
            // Text jména
            ctx.save();
            ctx.translate(center, center);
            ctx.rotate(i * slice + slice/2);
            ctx.fillStyle = "#ffffff";
            let fontSize = names.length > 20 ? 12 : 16;
            ctx.font = `bold ${fontSize}px Inter`;
            ctx.textBaseline = "middle";
            ctx.fillText(name.substring(0,18), 80, 0);
            ctx.restore();
        });
    }

    function startProcess() {
        const names = getNames();
        if (names.length < 2) return alert("Zadejte aspoň 2 jména hráčů!");

        const status = document.getElementById('status-text');
        
        isShuffling = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('output').innerHTML = "";

        if (currentMode === 'spinner') {
            status.innerText = "LOSUJI...";
            status.style.color = "#fff";
            stopProcess(); // Kolo se zastaví samo
        } else {
            status.innerText = "MÍCHÁM...";
            status.style.color = "#fff";
            shuffleInterval = setInterval(() => {
                const temp = [...names].sort(() => Math.random() - 0.5);
                status.innerText = temp[0].toUpperCase() + " <> " + temp[1].toUpperCase();
            }, 70);
        }
    }

    function stopProcess() {
        clearInterval(shuffleInterval);
        const names = getNames();
        const status = document.getElementById('status-text');
        const countInput = document.getElementById('countInput');
        let countValue = parseInt(countInput.value) || 2;

        if (currentMode === 'spinner') {
            const extra = 3000 + Math.random() * 4000;
            currentRotation += extra;
            document.getElementById('wheel-canvas').style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDeg = (360 - (currentRotation % 360) - 90) % 360; 
                const adjustedDeg = actualDeg < 0 ? actualDeg + 360 : actualDeg;
                const idx = Math.floor(adjustedDeg / (360 / names.length));
                
                status.innerHTML = `VÍTĚZ: <span style="color:var(--accent); text-shadow: 0 0 15px var(--accent);">${names[idx]}</span>`;
                resetButtons();
            }, 5000);

        } else {
            status.innerText = "HOTOVO";
            status.style.color = "var(--text-muted)";
            
            let shuffled = [...names].sort(() => Math.random() - 0.5);
            let groups = [];

            if (currentMode === 'groups') {
                // Skupiny po X lidech
                for (let i = 0; i < shuffled.length; i += countValue) {
                    groups.push(shuffled.slice(i, i + countValue));
                }
            } else {
                // Rozdělit na X týmů
                groups = Array.from({length: countValue}, () => []);
                shuffled.forEach((name, i) => groups[i % countValue].push(name));
            }

            document.getElementById('output').innerHTML = groups
                .filter(g => g.length > 0)
                .map((g, i) => `
                <div class="group-card">
                    <div class="group-header">Tým ${i+1}</div>
                    <ul class="member-list">
                        ${g.map(n => `<li class="member-item">${n}</li>`).join('')}
                    </ul>
                </div>
            `).join('');
            
            resetButtons();
        }
    }

    function resetButtons() {
        isShuffling = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    document.getElementById('namesInput').addEventListener('input', () => {
        if(currentMode === 'spinner') drawWheel();
    });

    setMode('spinner', document.querySelector('.mode-btn'));
</script>

</body>
</html>
