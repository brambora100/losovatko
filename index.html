<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Losovátko: Rozdělení do týmů</title>
    <style>
        :root {
            --bg: #0f172a;
            --blue: #3b82f6;
            --orange: #f97316;
            --neutral: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px;
        }

        .container {
            background: var(--glass);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 { margin-top: 0; font-weight: 800; letter-spacing: -1px; }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 20px;
            resize: none;
        }

        textarea:focus { outline: 2px solid var(--blue); border-color: transparent; }

        .btn {
            border: none;
            padding: 18px 40px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 20px;
        }

        #startBtn { background: var(--blue); color: white; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        #startBtn:hover { transform: scale(1.02); filter: brightness(1.1); }

        #stopBtn { 
            background: #ef4444; 
            color: white; 
            display: none; 
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status-msg {
            height: 30px;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--blue);
            font-size: 1.2rem;
        }

        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
        }

        .team-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            min-height: 150px;
        }

        .team-title {
            font-size: 1.2rem;
            font-weight: 800;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .title-blue { background: var(--blue); color: white; box-shadow: 0 0 15px var(--blue); }
        .title-orange { background: var(--orange); color: white; box-shadow: 0 0 15px var(--orange); }

        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            animation: fadeIn 0.5s forwards;
        }
        li:last-child { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>ROZLOSOVÁNÍ TÝMŮ</h1>
        
        <textarea id="namesInput" placeholder="Vložte jména (oddělená čárkou nebo novým řádkem)..."></textarea>
        
        <button id="startBtn" class="btn" onclick="startShuffling()">Začít losovat</button>
        <button id="stopBtn" class="btn" onclick="stopShuffling()">STOP!</button>

        <div id="status" class="status-msg"></div>

        <div class="results">
            <div class="team-box">
                <div class="team-title title-blue">MODŘÍ</div>
                <ul id="groupA"></ul>
            </div>
            <div class="team-box">
                <div class="team-title title-orange">ORANŽOVÍ</div>
                <ul id="groupB"></ul>
            </div>
        </div>
    </div>

    <script>
        let shuffleInterval;
        let currentNames = [];

        function startShuffling() {
            const input = document.getElementById('namesInput').value;
            currentNames = input.split(/[,\n]/).map(name => name.trim()).filter(name => name !== "");

            if (currentNames.length < 2) {
                alert("Zadejte aspoň dvě jména, ať je co losovat!");
                return;
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('status').innerText = "Míchám jména...";

            // Efekt míchání
            shuffleInterval = setInterval(() => {
                const tempShuffle = [...currentNames].sort(() => Math.random() - 0.5);
                document.getElementById('status').innerText = "Míchám: " + tempShuffle.slice(0, 2).join(" • ") + "...";
            }, 80);
        }

        function stopShuffling() {
            clearInterval(shuffleInterval);
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').innerText = "HOTOVO!";

            // Náhodné zamíchání
            let shuffled = [...currentNames].sort(() => Math.random() - 0.5);
            
            // Rozdělení
            const half = Math.ceil(shuffled.length / 2);
            const teamA = shuffled.slice(0, half);
            const teamB = shuffled.slice(half);

            renderList('groupA', teamA);
            renderList('groupB', teamB);
        }

        function renderList(id, names) {
            const list = document.getElementById(id);
            list.innerHTML = "";
            names.forEach((name, index) => {
                setTimeout(() => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    list.appendChild(li);
                }, index * 100); // Postupné zobrazování pro efekt
            });
        }
    </script>
</body>
</html>
