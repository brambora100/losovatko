<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Losovátko 2026 - XL Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Menu */
        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .mode-btn {
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 14px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            border-color: transparent;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--border);
            border-radius: 20px;
            color: white;
            padding: 20px;
            font-size: 1.1rem;
            margin-bottom: 25px;
            box-sizing: border-box;
            resize: vertical;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            flex: 1;
            padding: 22px;
            border-radius: 18px;
            border: none;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        #startBtn { background: var(--success); color: white; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        #stopBtn { background: var(--danger); color: white; display: none; animation: pulse 0.8s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* OBŘÍ KOLO ŠTĚSTÍ */
        #wheel-wrapper {
            position: relative;
            width: 520px; /* Zvětšeno */
            height: 520px;
            margin: 20px auto 60px;
            display: none;
        }

        .wheel-arrow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 45px solid #ff4757;
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        canvas {
            border-radius: 50%;
            border: 10px solid rgba(255,255,255,0.05);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.4);
        }

        /* Výsledky */
        .group-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            width: 100%;
        }

        .group-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            width: 250px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }

        .group-header {
            font-weight: 900;
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        li { 
            padding: 12px 0; 
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        #status-text {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 30px;
            min-height: 50px;
            color: #fff;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('spinner', this)">OBŘÍ SPINNER</button>
        <button class="mode-btn" onclick="setMode('group-2', this)">GROUPS OF 2</button>
        <button class="mode-btn" onclick="setMode('group-3', this)">GROUPS OF 3</button>
        <button class="mode-btn" onclick="setMode('team-2', this)">2 TEAMS</button>
        <button class="mode-btn" onclick="setMode('team-3', this)">3 TEAMS</button>
        <button class="mode-btn" onclick="setMode('team-4', this)">4 TEAMS</button>
    </div>

    <textarea id="namesInput" placeholder="Zadejte jména (každé na nový řádek)..."></textarea>
    
    <div class="controls">
        <button id="startBtn" class="btn" onclick="startProcess()">START</button>
        <button id="stopBtn" class="btn" onclick="stopProcess()">STOP!</button>
    </div>

    <div id="status-text"></div>

    <div id="wheel-wrapper">
        <div class="wheel-arrow"></div>
        <canvas id="wheel-canvas" width="500" height="500"></canvas>
    </div>

    <div id="output" class="group-grid"></div>
</div>

<script>
    let currentMode = 'spinner';
    let currentRotation = 0;
    let shuffleInterval;
    let isShuffling = false;

    function setMode(mode, btn) {
        if(isShuffling) return;
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('wheel-wrapper').style.display = (mode === 'spinner') ? 'block' : 'none';
        document.getElementById('output').innerHTML = "";
        document.getElementById('status-text').innerText = "";
        if(mode === 'spinner') drawWheel();
    }

    function getNames() {
        return document.getElementById('namesInput').value.split(/[,\n]/).map(n => n.trim()).filter(n => n !== "");
    }

    function drawWheel() {
        const names = getNames();
        if (names.length === 0) return;
        const canvas = document.getElementById('wheel-canvas');
        const ctx = canvas.getContext('2d');
        const slice = (Math.PI * 2) / names.length;
        ctx.clearRect(0,0,500,500);
        
        names.forEach((name, i) => {
            ctx.beginPath();
            ctx.fillStyle = `hsl(${(i * 360) / names.length}, 75%, 50%)`;
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 245, i * slice, (i + 1) * slice);
            ctx.fill();
            
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(i * slice + slice/2);
            ctx.fillStyle = "white";
            ctx.font = "bold 18px sans-serif"; // Větší písmo
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.fillText(name.substring(0,15), 90, 8);
            ctx.restore();
        });
    }

    function startProcess() {
        const names = getNames();
        if (names.length < 2) return alert("Zadejte aspoň 2 jména!");

        isShuffling = true;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';
        document.getElementById('output').innerHTML = "";

        if (currentMode === 'spinner') {
            document.getElementById('status-text').innerText = "Točíme...";
            stopProcess(); 
        } else {
            document.getElementById('status-text').innerText = "Míchám...";
            shuffleInterval = setInterval(() => {
                const temp = [...names].sort(() => Math.random() - 0.5);
                document.getElementById('status-text').innerText = temp[0] + " ↔ " + temp[1];
            }, 60);
        }
    }

    function stopProcess() {
        clearInterval(shuffleInterval);
        const names = getNames();
        const status = document.getElementById('status-text');

        if (currentMode === 'spinner') {
            const extra = 2500 + Math.random() * 3500;
            currentRotation += extra;
            const canvas = document.getElementById('wheel-canvas');
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualDeg = (360 - (currentRotation % 360) - 90) % 360; 
                const adjustedDeg = actualDeg < 0 ? actualDeg + 360 : actualDeg;
                const idx = Math.floor(adjustedDeg / (360 / names.length));
                status.innerHTML = `<span style="color:#10b981">VÍTĚZ:</span> ${names[idx]}`;
                resetButtons();
            }, 5000);

        } else {
            status.innerText = "HOTOVO!";
            let shuffled = [...names].sort(() => Math.random() - 0.5);
            let groups = [];

            if (currentMode.startsWith('group-')) {
                const size = parseInt(currentMode.split('-')[1]);
                for (let i = 0; i < shuffled.length; i += size) groups.push(shuffled.slice(i, i + size));
            } else {
                const count = parseInt(currentMode.split('-')[1]);
                groups = Array.from({length: count}, () => []);
                shuffled.forEach((name, i) => groups[i % count].push(name));
            }

            document.getElementById('output').innerHTML = groups.map((g, i) => `
                <div class="group-card">
                    <div class="group-header">${currentMode.includes('team') ? 'Tým' : 'Skupina'} ${i+1}</div>
                    <ul style="list-style:none; padding:0;">${g.map(n => `<li>${n}</li>`).join('')}</ul>
                </div>
            `).join('');
            resetButtons();
        }
    }

    function resetButtons() {
        isShuffling = false;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    document.getElementById('namesInput').addEventListener('input', () => {
        if(currentMode === 'spinner') drawWheel();
    });

    setMode('spinner', document.querySelector('.mode-btn'));
</script>

</body>
</html>
